name: Keep Supabase Awake

permissions:
  contents: write

on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            "https://xulnmhxfsmrxtujghvho.supabase.co/rest/v1/tags?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1bG5taHhmc21yeHR1amdodmhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTk3NDEsImV4cCI6MjA5OTE5NTc0MX0.zvbQBO-kgnCf28vHm8punXQBY5N6CuGJinaTt8tbWms" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1bG5taHhmc21yeHR1amdodmhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTk3NDEsImV4cCI6MjA5OTE5NTc0MX0.zvbQBO-kgnCf28vHm8punXQBY5N6CuGJinaTt8tbWms"

      - name: Record a keep-alive commit
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > keep-alive-last-run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keep-alive-last-run.txt
          git commit -m "chore: keep-alive ping" || echo "Inget att committa"
          git push
